<script>
	document.getElementById("preCosultationForm").addEventListener("submit", function (e) {

    e.preventDefault();

    const response = grecaptcha.getResponse();

    if (response.length === 0) {

        alert("Please complete the reCAPTCHA.");
        return;
    }

    const form = this;
    const formData = new FormData(form);

    fetch(form.action, {

        method: "POST",
        body: formData

    })
    .then(res => res.json())
    .then(data => {

        if (data.success) {

    // Hide form
    document.getElementById("preCosultationForm").style.display = "none";

    // Show success message
    document.getElementById("form-message").innerHTML = `
        <div class="success-box">
            <h2>送信完了</h2>
            <p>
                お問い合わせありがとうございます。<br>
                内容を確認のうえ、担当者よりご連絡いたします。
            </p>
        </div>
    `;

    grecaptcha.reset();

} else {

    document.getElementById("form-message").innerHTML = `
        <div class="error-box">
            ${data.message}
        </div>
    `;

}

    })
    .catch(() => {

        document.getElementById("form-message").innerHTML =
            "<p style='color:red'>Something went wrong.</p>";

    });

});
	</script>
